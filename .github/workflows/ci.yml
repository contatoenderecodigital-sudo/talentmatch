name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Arquivos gerados não podem derivar das fontes (quiz e fixtures)
      - run: node scripts/gen-quiz-data.mjs && node scripts/gen-sql-fixtures.mjs
      - run: git diff --exit-code
